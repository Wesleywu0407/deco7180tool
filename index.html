<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adjust — Lesson Plans</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#059669' }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=2" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.svg?v=2" />
  <meta name="application-name" content="Adjust" />
  <meta name="apple-mobile-web-app-title" content="Adjust" />
  <meta name="theme-color" content="#059669" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <div id="sidebar"></div>

  <!-- Main -->
  <main class="ml-[220px] flex-1 overflow-y-auto">

    <!-- Top bar -->
    <header class="app-topbar sticky top-0 z-20">
      <div>
        <h1>This week's lesson plans</h1>
        <p id="lesson-summary">4 lessons · 5 SEN students</p>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="trackEvent('report_exported',{pageId:'lessons'})"
          class="btn-ghost">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Export adjustments
        </button>
        <button id="new-lesson-btn" class="btn-solid">
          + New lesson
        </button>
      </div>
    </header>

    <!-- Content -->
    <div class="px-8 py-6 space-y-6">
      <div id="lesson-created-banner" class="status-banner hidden">
        Lesson plan saved and added to this week's list.
      </div>
      <p class="app-section-label">This week's lessons</p>

      <!-- Card grid -->
      <div class="grid grid-cols-3 gap-5" id="lesson-grid"></div>

      <!-- Recommendation banner -->
      <div id="rec-banner" class="recommendation-banner">
        <div class="recommendation-icon">
          <svg class="w-4 h-4 text-[#059669]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <div class="flex-1">
          <p class="recommendation-title">Recommended Adjustments</p>
          <p class="recommendation-copy">Based on Liam's recent sensory assessment, consider providing a noise-cancelling headset option for Thursday's Science ecosystem video.</p>
        </div>
        <div class="flex items-center gap-3 flex-shrink-0">
          <button onclick="trackEvent('recommendation_applied',{lessonId:'math-fractions'})" class="btn-solid text-sm">Apply to lesson</button>
          <button onclick="trackEvent('recommendation_dismissed',{});document.getElementById('rec-banner').remove()" class="btn-text-action">Dismiss</button>
        </div>
      </div>
    </div>

  </main>

  <script src="js/data.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/lesson-plans.js"></script>
</body>
</html>
