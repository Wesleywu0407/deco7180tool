<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adjust — Lesson Plans</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#1D9E75' }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=2" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.svg?v=2" />
  <meta name="application-name" content="Adjust" />
  <meta name="apple-mobile-web-app-title" content="Adjust" />
  <meta name="theme-color" content="#4CAF50" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="flex h-screen overflow-hidden bg-gray-50">

  <!-- Sidebar -->
  <div id="sidebar"></div>

  <!-- Main -->
  <main class="ml-[200px] flex-1 overflow-y-auto">

    <!-- Top bar -->
    <header class="flex items-center justify-between px-8 py-5 border-b border-gray-200 bg-white sticky top-0 z-20">
      <div>
        <h1 class="text-lg font-bold text-gray-900">This week's lesson plans</h1>
        <p id="lesson-summary" class="text-sm text-gray-500 mt-0.5">4 lessons · 5 SEN students</p>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="trackEvent('report_exported',{pageId:'lessons'})"
          class="flex items-center gap-2 px-4 py-2 border border-gray-300 text-gray-700 text-sm font-semibold rounded-lg hover:bg-gray-50 transition-colors bg-white">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Export adjustments
        </button>
        <button id="new-lesson-btn" class="flex items-center gap-2 px-4 py-2 bg-[#1D9E75] text-white text-sm font-semibold rounded-lg hover:bg-[#178a63] transition-colors">
          + New lesson
        </button>
      </div>
    </header>

    <!-- Content -->
    <div class="px-8 py-6 space-y-6">
      <div id="lesson-created-banner" class="status-banner hidden">
        Lesson plan saved and added to this week's list.
      </div>
      <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">This week's lessons</p>

      <!-- Card grid -->
      <div class="grid grid-cols-3 gap-5" id="lesson-grid"></div>

      <!-- Recommendation banner -->
      <div id="rec-banner" class="bg-purple-50 border border-purple-200 rounded-xl p-5 flex items-start gap-4">
        <div class="w-9 h-9 rounded-full bg-purple-100 flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-purple-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <div class="flex-1">
          <p class="text-sm font-semibold text-gray-900 mb-0.5">Recommended Adjustments</p>
          <p class="text-sm text-gray-600">Based on Liam's recent sensory assessment, consider providing a noise-cancelling headset option for Thursday's Science ecosystem video.</p>
        </div>
        <div class="flex items-center gap-3 flex-shrink-0">
          <button onclick="trackEvent('recommendation_applied',{lessonId:'math-fractions'})" class="px-3 py-1.5 bg-[#1D9E75] text-white text-xs font-semibold rounded-lg hover:bg-[#178a63] transition-colors">APPLY TO LESSON</button>
          <button onclick="trackEvent('recommendation_dismissed',{});document.getElementById('rec-banner').remove()" class="text-sm text-gray-500 hover:text-gray-700 cursor-pointer">Dismiss</button>
        </div>
      </div>
    </div>

  </main>

  <script src="js/data.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/lesson-plans.js"></script>
</body>
</html>
