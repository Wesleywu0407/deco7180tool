<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adjust — Lesson Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#059669' } } } }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=2" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.svg?v=2" />
  <meta name="application-name" content="Adjust" />
  <meta name="apple-mobile-web-app-title" content="Adjust" />
  <meta name="theme-color" content="#059669" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="flex h-screen overflow-hidden">

  <div id="sidebar"></div>

  <main class="ml-[220px] flex-1 flex flex-col overflow-hidden">

    <!-- ── Top bar ───────────────────────────────────────────────────────────── -->
    <header class="planner-topbar flex-shrink-0">
      <div>
        <nav class="flex items-center gap-1.5 mb-1" aria-label="Breadcrumb">
          <a href="index.html" class="planner-breadcrumb-link">Lesson plans</a>
          <svg class="w-3 h-3 text-gray-300 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
          <span id="breadcrumb-lesson" class="text-xs text-gray-500 font-medium truncate max-w-[300px]">Lesson planner</span>
        </nav>
        <h1 class="text-[22px] font-bold text-[#111827]">Lesson Planner</h1>
      </div>

      <div class="flex items-center gap-2">
        <button class="planner-btn-ghost">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          Export
        </button>
        <button class="planner-btn-primary">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
          </svg>
          Share
        </button>
      </div>
    </header>

    <!-- ── 3-column body ──────────────────────────────────────────────────────── -->
    <div class="planner-layout flex flex-1 overflow-hidden">

      <!-- ── LEFT: Class Roster (260px) ──────────────────────────────────────── -->
      <aside class="planner-col-left planner-panel flex flex-col flex-shrink-0">

        <!-- Roster header (fixed) -->
        <div class="px-4 pt-4 pb-3 border-b border-gray-100 flex-shrink-0">
          <p class="planner-col-label">Class Roster</p>
          <p id="roster-count" class="text-[11px] text-gray-400 mt-0.5">5 students · 0 selected</p>

          <!-- Search -->
          <div class="relative mt-3">
            <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400 pointer-events-none"
              fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/>
            </svg>
            <input
              id="roster-search"
              type="text"
              placeholder="Search students…"
              oninput="filterRoster(this.value)"
              class="planner-search-input w-full"
            />
          </div>
        </div>

        <!-- Roster list (scrollable) -->
        <div id="roster" class="flex-1 overflow-y-auto p-3 space-y-2"></div>

      </aside>

      <!-- ── MIDDLE: Lesson Context (flex) ───────────────────────────────────── -->
      <section class="planner-col-middle planner-panel flex flex-col flex-1 overflow-hidden">

        <!-- Column label (fixed) -->
        <div class="px-6 pt-4 pb-3 border-b border-gray-100 flex-shrink-0">
          <p class="planner-col-label">Lesson Context</p>
        </div>

        <!-- Scrollable content -->
        <div id="lesson-context" class="flex-1 overflow-y-auto"></div>

        <!-- Fixed save footer (view mode only; hidden in edit mode) -->
        <div id="lesson-footer" class="flex-shrink-0"></div>

      </section>

      <!-- ── RIGHT: Suggested Adjustments (320px) ────────────────────────────── -->
      <aside class="planner-col-right planner-panel flex flex-col flex-shrink-0">

        <!-- Sticky column header with progress + filter pills -->
        <div class="px-4 pt-4 pb-3 border-b border-gray-100 flex-shrink-0">
          <!-- Title + counter -->
          <div class="flex items-center justify-between mb-2">
            <p class="planner-col-label">Suggested Adjustments</p>
            <span id="adj-progress-label" class="text-[11px] font-semibold text-gray-500 tabular-nums">0 / 0 done</span>
          </div>

          <!-- Progress bar (4px) -->
          <div class="h-1 bg-gray-100 rounded-full overflow-hidden">
            <div id="adj-progress-bar"
              class="h-full bg-[#059669] rounded-full"
              style="width:0%;transition:width 0.3s ease"></div>
          </div>

          <!-- Filter pills -->
          <div id="adj-filters" class="flex flex-wrap gap-1.5 mt-3"></div>
        </div>

        <!-- Adjustment cards (scrollable) -->
        <div id="adjustments-list" class="flex-1 overflow-y-auto p-3 space-y-2.5"></div>

      </aside>

    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/planner.js"></script>
</body>
</html>
